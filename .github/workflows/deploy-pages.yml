name: Deploy Tim's Blues archive

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '日志/**'
      - '录音/**'
      - '曲目/**'
      - '进度/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout archive
        uses: actions/checkout@v7

      - name: Read Pages metadata
        id: pages
        uses: actions/configure-pages@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build Nuxt static site
        working-directory: website
        run: npm run build -- --preset github_pages
        env:
          NUXT_APP_BASE_URL: "${{ steps.pages.outputs.base_path }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
